<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Barang - Made in Indonesia</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .wadah-detail { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        
        .galeri-media { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px; padding-bottom: 10px; scroll-snap-type: x mandatory; }
        .item-media { flex: 0 0 100%; max-height: 350px; object-fit: contain; border-radius: 8px; background-color: #f9f9f9; scroll-snap-align: center; border: 1px solid #eee; }
        
        h1 { margin-top: 0; font-size: 24px; color: #333; margin-bottom: 5px; }
        .nama-toko { font-size: 14px; color: #666; margin-bottom: 15px; display: block; }
        .link-toko { color: #007bff; text-decoration: none; font-weight: bold; }
        .link-toko:hover { text-decoration: underline; }
        
        .harga { color: #2ecc71; font-size: 26px; font-weight: bold; margin: 10px 0; }
        .deskripsi { font-size: 15px; color: #555; line-height: 1.6; background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 20px; white-space: pre-wrap; }
        
        .stok-input { display: flex; align-items: center; margin-bottom: 20px; gap: 10px; }
        .stok-input label { font-weight: bold; color: #333; }
        .stok-input input { width: 70px; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        
        .wadah-tombol { display: flex; flex-direction: column; gap: 10px; }
        .wadah-tombol-sejajar { display: flex; gap: 10px; }
        
        .tombol-beli { flex: 1; background-color: #28a745; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; text-align: center; }
        .tombol-beli:hover { background-color: #218838; }
        
        .tombol-chat { flex: 1; background-color: #17a2b8; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; text-align: center; text-decoration: none; }
        .tombol-chat:hover { background-color: #138496; }

        /* GAYA BARU: TOMBOL WISHLIST */
        .tombol-wishlist { background-color: #fff; color: #e84393; border: 2px solid #e84393; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .tombol-wishlist:hover { background-color: #ffeef5; }
        
        .tombol-kembali { display: block; text-align: center; margin-top: 20px; color: #007bff; text-decoration: none; font-weight: bold; }
        .tombol-kembali:hover { text-decoration: underline; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="wadah-detail" id="konten-detail">
        <p style="text-align:center; color:#666; font-style:italic;">Memuat informasi barang...</p>
    </div>

    <script>
        const URL_SUPABASE = 'https://obdmfjjckdhzqbvhpung.supabase.co';
        const KUNCI_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZG1mampja2RoenFidmhwdW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjAwNTIsImV4cCI6MjA5ODYzNjA1Mn0.8zK13NJjFLopp3k5FmLn9Re88pFLiZPxV4RgPaEKj7M';
        const dbToko = window.supabase.createClient(URL_SUPABASE, KUNCI_SUPABASE);

        // Ambil ID dari URL (contoh: detail-produk.html?id=123)
        const parameterUrl = new URLSearchParams(window.location.search);
        const idBarang = parameterUrl.get('id');
        let dataBarangSaatIni = null;
        let apakahDisukai = false;
        let emailPenggunaAktif = null;

        async function muatDetailBarang() {
            if (!idBarang) {
                document.getElementById('konten-detail').innerHTML = '<p style="color:red; text-align:center;">Barang tidak ditemukan. (ID Kosong)</p>';
                return;
            }

            // Cek pengguna yang sedang login
            const { data: { session } } = await dbToko.auth.getSession();
            if (session) {
                emailPenggunaAktif = session.user.email;
                
                // Cek apakah barang ini ada di wishlist pengguna
                const { data: dataWishlist } = await dbToko.from('wishlist_user')
                    .select('id')
                    .match({ email_pembeli: emailPenggunaAktif, id_produk: idBarang });
                
                if (dataWishlist && dataWishlist.length > 0) {
                    apakahDisukai = true;
                }
            }

            // Ambil data produk
            const { data, error } = await dbToko.from('produk').select('*').eq('id', idBarang).single();

            if (error || !data) {
                document.getElementById('konten-detail').innerHTML = '<p style="color:red; text-align:center;">Gagal memuat atau barang sudah dihapus.</p>';
                return;
            }

            dataBarangSaatIni = data;
            const hargaRupiah = new Intl.NumberFormat('id-ID').format(data.harga);
            
            let htmlMedia = '';
            if (data.foto_url) {
                const daftarLink = data.foto_url.split(',');
                
                daftarLink.sort((a, b) => {
                    const isVideoA = a.toLowerCase().match(/\.(mp4|mov|webm)$/i);
                    const isVideoB = b.toLowerCase().match(/\.(mp4|mov|webm)$/i);
                    if (isVideoA && !isVideoB) return -1; 
                    if (!isVideoA && isVideoB) return 1;  
                    return 0;
                });

                htmlMedia = '<div class="galeri-media">';
                daftarLink.forEach(link => {
                    if (link.toLowerCase().match(/\.(mp4|mov|webm)$/i)) {
                        htmlMedia += `<video src="${link}" class="item-media" controls preload="metadata"></video>`;
                    } else {
                        htmlMedia += `<img src="${link}" class="item-media" alt="Foto Barang">`;
                    }
                });
                htmlMedia += '</div>';
            }

            const namaToko = data.email_penjual ? data.email_penjual.split('@')[0] : 'Umum';
            const alamatEmailPemilik = data.email_penjual || '#'; 
            
            // Konfigurasi teks tombol wishlist
            const teksWishlist = apakahDisukai ? '❤️ Tersimpan di Favorit' : '🤍 Simpan ke Favorit';
            const warnaBorderWishlist = apakahDisukai ? '#d63079' : '#e84393';
            const warnaBackgroundWishlist = apakahDisukai ? '#ffeef5' : '#fff';

            document.getElementById('konten-detail').innerHTML = `
                ${htmlMedia}
                <h1>${data.nama_barang}</h1>
                <span class="nama-toko">Dijual oleh: <a href="toko.html?email=${alamatEmailPemilik}" class="link-toko">${namaToko}</a></span>
                <p class="harga">Rp ${hargaRupiah}</p>
                <div class="deskripsi">${data.deskripsi || 'Tidak ada deskripsi.'}</div>
                
                <div class="stok-input">
                    <label for="jumlah-beli">Jumlah Beli:</label>
                    <input type="number" id="jumlah-beli" value="1" min="1">
                </div>
                
                <div class="wadah-tombol">
                    <!-- FITUR BARU: TOMBOL WISHLIST -->
                    <button class="tombol-wishlist" id="btn-wishlist" style="border-color: ${warnaBorderWishlist}; background-color: ${warnaBackgroundWishlist};" onclick="prosesWishlist()">
                        ${teksWishlist}
                    </button>

                    <div class="wadah-tombol-sejajar">
                        <button class="tombol-beli" onclick="masukkanKeKeranjang()">🛒 Masukkan Keranjang</button>
                        <button class="tombol-chat" onclick="bukaChatPenjual('${data.email_penjual}')">💬 Chat Penjual</button>
                    </div>
                </div>

                <a href="index.html" class="tombol-kembali">← Kembali ke Halaman Utama</a>
            `;
        }

        // FUNGSI BARU: Logika Menambah/Menghapus Wishlist
        async function prosesWishlist() {
            if (!emailPenggunaAktif) {
                alert("Silakan Masuk Toko / Login terlebih dahulu untuk menyimpan barang ke daftar Favorit!");
                window.location.href = 'login.html';
                return;
            }

            const btnWishlist = document.getElementById('btn-wishlist');

            if (apakahDisukai) {
                // Hapus dari wishlist
                btnWishlist.innerHTML = '🤍 Simpan ke Favorit';
                btnWishlist.style.backgroundColor = '#fff';
                btnWishlist.style.borderColor = '#e84393';
                apakahDisukai = false;

                await dbToko.from('wishlist_user').delete().match({ 
                    email_pembeli: emailPenggunaAktif, 
                    id_produk: idBarang 
                });
            } else {
                // Tambah ke wishlist
                btnWishlist.innerHTML = '❤️ Tersimpan di Favorit';
                btnWishlist.style.backgroundColor = '#ffeef5';
                btnWishlist.style.borderColor = '#d63079';
                apakahDisukai = true;

                await dbToko.from('wishlist_user').insert([{ 
                    email_pembeli: emailPenggunaAktif, 
                    id_produk: idBarang 
                }]);
            }
        }

        async function bukaChatPenjual(emailPenjual) {
            if (!emailPenjual) {
                alert("Email penjual tidak diketahui.");
                return;
            }
            if (!emailPenggunaAktif) {
                alert("Silakan Masuk Toko (Login) terlebih dahulu untuk mulai mengirim pesan.");
                window.location.href = 'login.html';
                return;
            }
            if (emailPenggunaAktif === emailPenjual) {
                alert("Ini adalah barang jualanmu sendiri.");
                return;
            }
            
            window.location.href = `ruang-chat.html?lawan=${emailPenjual}`;
        }

        function masukkanKeKeranjang() {
            if (!dataBarangSaatIni) return;

            if (!emailPenggunaAktif) {
                alert("Silakan Masuk Toko (Login) terlebih dahulu untuk mulai berbelanja.");
                window.location.href = 'login.html';
                return;
            }

            const jumlah = document.getElementById('jumlah-beli').value;
            if (jumlah < 1) {
                alert("Jumlah beli minimal 1");
                return;
            }

            const kunciPrivat = 'keranjang_' + emailPenggunaAktif;
            let keranjangLama = JSON.parse(localStorage.getItem(kunciPrivat)) || [];
            
            const indexBarangSama = keranjangLama.findIndex(item => item.id === dataBarangSaatIni.id);

            if (indexBarangSama !== -1) {
                keranjangLama[indexBarangSama].jumlah = parseInt(keranjangLama[indexBarangSama].jumlah) + parseInt(jumlah);
            } else {
                keranjangLama.push({
                    id: dataBarangSaatIni.id,
                    nama: dataBarangSaatIni.nama_barang,
                    harga: dataBarangSaatIni.harga,
                    foto: dataBarangSaatIni.foto_url ? dataBarangSaatIni.foto_url.split(',')[0] : '',
                    jumlah: parseInt(jumlah),
                    email_penjual: dataBarangSaatIni.email_penjual 
                });
            }

            localStorage.setItem(kunciPrivat, JSON.stringify(keranjangLama));
            alert("Berhasil dimasukkan ke keranjang!");
            window.location.href = 'index.html'; 
        }

        muatDetailBarang();
    </script>
</body>
</html>
