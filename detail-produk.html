<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - Made in Indonesia</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; }
        .wadah-detail { width: 100%; max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: left; }
        
        .galeri-media { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px; padding-bottom: 5px; scroll-snap-type: x mandatory; }
        .item-media { flex: 0 0 100%; height: 350px; object-fit: contain; border-radius: 8px; background-color: #fafafa; scroll-snap-align: center; }
        
        h1 { margin: 0 0 5px 0; color: #333; font-size: 24px; }
        .nama-toko { font-size: 14px; color: #007bff; font-weight: bold; margin-bottom: 15px; display: block; }
        .harga { color: #2ecc71; font-size: 26px; font-weight: bold; margin: 15px 0; }
        
        .pilihan-varian p { margin: 15px 0 5px 0; font-weight: bold; font-size: 15px; color: #444; }
        .wadah-tombol-varian { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tombol-varian { padding: 10px 16px; border: 1px solid #ccc; background: white; border-radius: 5px; cursor: pointer; font-size: 14px; color: #333; transition: 0.2s; }
        .tombol-varian.aktif { border-color: #007bff; color: #007bff; background: #ebf5ff; font-weight: bold; }
        
        .sub-judul { font-weight: bold; font-size: 16px; color: #444; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; margin-bottom: 8px; }
        .deskripsi { font-size: 15px; color: #555; line-height: 1.6; white-space: pre-wrap; margin-bottom: 25px; }
        
        .grup-tombol-beli { display: flex; gap: 12px; margin-top: 25px; }
        .btn-aksi { flex: 1; padding: 15px; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; text-align: center; transition: 0.2s; text-decoration: none; }
        .btn-keranjang { background-color: #fff; color: #007bff; border: 2px solid #007bff; }
        .btn-keranjang:hover { background-color: #f0f7ff; }
        .btn-beli-langsung { background-color: #ff5722; color: white; }
        .btn-beli-langsung:hover { background-color: #e64a19; }
        
        .btn-kembali { display: inline-block; margin-bottom: 15px; color: #666; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="wadah-detail">
        <a href="index.html" class="btn-kembali">← Kembali ke Etalase</a>
        <div id="konten-produk">
            <p style="color:#666; font-style:italic;">Memuat detail produk...</p>
        </div>
    </div>

    <script>
        const URL_SUPABASE = 'https://obdmfjjckdhzqbvhpung.supabase.co';
        const KUNCI_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZG1mampja2RoenFidmhwdW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjAwNTIsImV4cCI6MjA5ODYzNjA1Mn0.8zK13NJjFLopp3k5FmLn9Re88pFLiZPxV4RgPaEKj7M';
        const dbToko = window.supabase.createClient(URL_SUPABASE, KUNCI_SUPABASE);

        let idProdukAktif = "";
        let namaProdukAktif = "";
        let hargaAktif = 0;
        let varianAktif = "Normal";
        let linkFotoCover = ""; 

        async function muatDetailProduk() {
            const wadah = document.getElementById('konten-produk');
            const urlParams = new URLSearchParams(window.location.search);
            idProdukAktif = urlParams.get('id');

            if (!idProdukAktif) {
                wadah.innerHTML = "<p style='color:red;'>Produk tidak ditemukan!</p>"; return;
            }

            const { data: barang, error } = await dbToko.from('produk').select('*').eq('id', idProdukAktif).single();

            if (error || !barang) {
                wadah.innerHTML = "<p style='color:red;'>Gagal memuat barang.</p>"; return;
            }

            namaProdukAktif = barang.nama_barang;
            hargaAktif = barang.harga;

            let htmlMedia = '';
            if (barang.foto_url) {
                const daftarLink = barang.foto_url.split(',');
                daftarLink.sort((a, b) => {
                    const isVideoA = a.toLowerCase().match(/\.(mp4|mov|webm)$/i);
                    const isVideoB = b.toLowerCase().match(/\.(mp4|mov|webm)$/i);
                    if (isVideoA && !isVideoB) return -1;
                    if (!isVideoA && isVideoB) return 1;
                    return 0;
                });
                
                const linkFotoSaja = daftarLink.find(link => !link.toLowerCase().match(/\.(mp4|mov|webm)$/i));
                linkFotoCover = linkFotoSaja || daftarLink[0]; 

                htmlMedia = '<div class="galeri-media">';
                daftarLink.forEach(link => {
                    if (link.toLowerCase().match(/\.(mp4|mov|webm)$/i)) {
                        htmlMedia += `<video src="${link}" class="item-media" controls preload="metadata"></video>`;
                    } else {
                        htmlMedia += `<img src="${link}" class="item-media" alt="${barang.nama_barang}">`;
                    }
                });
                htmlMedia += '</div>';
            }

            let htmlVarian = '';
            if (barang.varian) {
                const listVarian = barang.varian.split(',').map(v => v.trim()).filter(v => v !== '');
                if (listVarian.length > 0) {
                    htmlVarian += `<div class="pilihan-varian"><p>Pilih Varian Ukuran/Warna:</p><div class="wadah-tombol-varian">`;
                    listVarian.forEach((v, index) => {
                        const pecahan = v.split(':');
                        const namaVarian = pecahan[0];
                        const hargaVarian = pecahan[1] || barang.harga;
                        
                        const kelasAktif = index === 0 ? 'aktif' : '';
                        if(index === 0) {
                            hargaAktif = hargaVarian;
                            varianAktif = namaVarian;
                        }

                        htmlVarian += `<button class="tombol-varian ${kelasAktif}" onclick="ubahVarianDetail(this, '${hargaVarian}', '${namaVarian}')">${namaVarian}</button>`;
                    });
                    htmlVarian += `</div></div>`;
                }
            }

            const namaToko = barang.email_penjual ? barang.email_penjual.split('@')[0] : 'Umum';
            const hargaFormat = new Intl.NumberFormat('id-ID').format(hargaAktif);

            wadah.innerHTML = `
                ${htmlMedia}
                <h1>${barang.nama_barang}</h1>
                <span class="nama-toko">Oleh Toko: ${namaToko}</span>
                <div class="harga" id="harga-detail-layar">Rp ${hargaFormat}</div>
                ${htmlVarian}
                <div class="sub-judul">Detail Deskripsi Barang</div>
                <div class="deskripsi">${barang.deskripsi}</div>
                <div class="sub-judul">Status Ketersediaan</div>
                <p style="font-size: 15px; margin: 5px 0 25px 0;">Stok Tersedia: <strong>${barang.stok} unit</strong></p>

                <div class="grup-tombol-beli">
                    <button class="btn-aksi btn-keranjang" onclick="aksiKeranjang(false)">🛒 + Keranjang</button>
                    <button class="btn-aksi btn-beli-langsung" onclick="aksiBeliLangsung()">Beli Langsung</button>
                </div>
            `;
        }

        function ubahVarianDetail(tombol, hargaBaru, namaVarian) {
            const semuaTombol = tombol.parentElement.querySelectorAll('.tombol-varian');
            semuaTombol.forEach(btn => btn.classList.remove('aktif'));
            tombol.classList.add('aktif');

            hargaAktif = hargaBaru;
            varianAktif = namaVarian;

            const hargaFormat = new Intl.NumberFormat('id-ID').format(hargaBaru);
            document.getElementById('harga-detail-layar').innerText = `Rp ${hargaFormat}`;
        }

        // FUNGSI BARU: PENGECEKAN STATUS LOGIN PEMBELI
        async function validasiLoginPembeli() {
            const { data: { session } } = await dbToko.auth.getSession();
            if (!session) {
                alert("Ups! Kamu harus punya akun dan masuk (login) terlebih dahulu untuk mulai berbelanja.");
                window.location.href = "login.html";
                return false;
            }
            return true;
        }

        // FUNGSI KERANJANG DIUBAH MENJADI ASYNC AGAR BISA MENUNGGU PENGECEKAN
        async function aksiKeranjang(dariBeliLangsung) {
            // Cek apakah pembeli sudah login
            const bolehBeli = await validasiLoginPembeli();
            if (!bolehBeli) return; // Jika belum, hentikan proses penyimpanan keranjang

            let isiKeranjang = JSON.parse(localStorage.getItem('keranjang')) || [];
            let barangSama = isiKeranjang.find(item => item.id === idProdukAktif && item.varian === varianAktif);

            if (barangSama) {
                barangSama.jumlah = parseInt(barangSama.jumlah) + 1; 
            } else {
                isiKeranjang.push({
                    id: idProdukAktif,
                    nama: namaProdukAktif,
                    varian: varianAktif,
                    harga: parseInt(hargaAktif),
                    foto: linkFotoCover,
                    jumlah: 1
                });
            }

            localStorage.setItem('keranjang', JSON.stringify(isiKeranjang));
            
            // Tampilkan alert hanya jika tombol ditekan langsung (bukan dari tombol Beli Langsung)
            if (!dariBeliLangsung) {
                alert(`Sukses! "${namaProdukAktif} (${varianAktif})" telah dimasukkan ke keranjang belanja.`);
            }
        }

        async function aksiBeliLangsung() {
            // Cek login juga berlaku untuk Beli Langsung
            const bolehBeli = await validasiLoginPembeli();
            if (!bolehBeli) return;

            await aksiKeranjang(true);
            window.location.href = "checkout.html";
        }

        muatDetailProduk();
    </script>
</body>
</html>
