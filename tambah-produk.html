<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Barang - Made in Indonesia</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; }
        .wadah-form { width: 100%; max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        input[type="text"], input[type="number"], textarea, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; background-color: white; }
        .tombol-simpan { display: block; width: 100%; background-color: #007bff; color: white; padding: 14px; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; margin-top: 25px; cursor: pointer; }
        .tombol-simpan:hover { background-color: #0056b3; }
        .kembali { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; }
        .info-ukuran { font-size: 12px; color: #e74c3c; margin-bottom: 10px; display: block; font-style: italic; }
        #preview-file { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
        .item-file { display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 10px; border-radius: 5px; font-size: 14px; border: 1px solid #ddd; }
        .tombol-hapus { background: #ff4d4d; color: white; border: none; border-radius: 3px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        /* DESAIN INPUT VARIAN BARU */
        .baris-varian { display: flex; gap: 8px; margin-top: 8px; }
        .tombol-tambah-varian { background-color: #28a745; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; margin-top: 8px; font-weight: bold; font-size: 14px; }
        .tombol-tambah-varian:hover { background-color: #218838; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="wadah-form">
        <h2>Pajang Barang Daganganmu</h2>
        
        <label>Foto & Video Barang</label>
        <span class="info-ukuran">*Maksimal 50 MB per file.</span>
        <input type="file" accept="image/*, video/*" id="input-file" multiple onchange="tambahFile()">
        <div id="preview-file"></div>

        <label>Nama Barang</label>
        <input type="text" id="nama" placeholder="Contoh: Minyak Kemiri Murni">

        <label>Pilihan Varian & Harga Spesifik</label>
        <div id="wadah-varian-input">
            </div>
        <button type="button" class="tombol-tambah-varian" onclick="tambahBarisVarian()">+ Tambah Varian (Ukuran/Warna)</button>

        <label>Harga Dasar / Termurah (Rp)</label>
        <input type="number" id="harga" placeholder="Contoh: 30000">

        <label>Jumlah Stok Utama</label>
        <input type="number" id="stok" placeholder="Contoh: 150">

        <label>Deskripsi Singkat</label>
        <textarea id="deskripsi" rows="4" placeholder="Ceritakan keunggulan produkmu di sini..."></textarea>

        <button id="tombol-simpan" class="tombol-simpan" onclick="simpanData()">Simpan Barang & Media</button>

        <a href="index.html" class="kembali">Kembali ke Halaman Utama</a>
    </div>

    <script>
        const URL_SUPABASE = 'https://obdmfjjckdhzqbvhpung.supabase.co';
        const KUNCI_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZG1mampja2RoenFidmhwdW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjAwNTIsImV4cCI6MjA5ODYzNjA1Mn0.8zK13NJjFLopp3k5FmLn9Re88pFLiZPxV4RgPaEKj7M';
        const dbToko = window.supabase.createClient(URL_SUPABASE, KUNCI_SUPABASE);

        let daftarFile = [];

        // Fungsi menambah baris varian baru secara dinamis
        function tambahBarisVarian() {
            const wadah = document.getElementById('wadah-varian-input');
            const div = document.createElement('div');
            div.className = 'baris-varian';
            div.innerHTML = `
                <input type="text" class="input-nama-varian" placeholder="Nama (cth: 30ml)" style="flex: 2;">
                <input type="number" class="input-harga-varian" placeholder="Harga Rp (cth: 35000)" style="flex: 2;">
                <button type="button" class="tombol-hapus" onclick="this.parentElement.remove()" style="padding: 12px;">X</button>
            `;
            wadah.appendChild(div);
        }

        // Jalankan sekali di awal agar langsung muncul 1 baris kosong isi varian
        tambahBarisVarian();

        function tambahFile() {
            const input = document.getElementById('input-file');
            const filesBaru = input.files;
            const maxUkuran = 50 * 1024 * 1024; 

            for(let i = 0; i < filesBaru.length; i++) {
                if (filesBaru[i].size > maxUkuran) {
                    alert(`Gagal! File "${filesBaru[i].name}" berukuran melebihi 50 MB.`);
                } else {
                    daftarFile.push(filesBaru[i]); 
                }
            }
            input.value = ""; 
            tampilkanPreview();
        }

        function tampilkanPreview() {
            const wadahPreview = document.getElementById('preview-file');
            wadahPreview.innerHTML = ""; 
            daftarFile.forEach((file, index) => {
                const ukuranMB = (file.size / (1024 * 1024)).toFixed(1);
                const divItem = document.createElement('div');
                divItem.className = 'item-file';
                divItem.innerHTML = `
                    <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80%;">${file.name} (${ukuranMB} MB)</span>
                    <button class="tombol-hapus" onclick="hapusFile(${index})">X</button>
                `;
                wadahPreview.appendChild(divItem);
            });
        }

        function hapusFile(index) {
            daftarFile.splice(index, 1); 
            tampilkanPreview(); 
        }

        async function simpanData() {
            const namaBarang = document.getElementById('nama').value;
            const hargaBarang = document.getElementById('harga').value;
            const stokBarang = document.getElementById('stok').value;
            const deskripsiBarang = document.getElementById('deskripsi').value;
            const tombol = document.getElementById('tombol-simpan');

            // Menggabungkan isian varian nama & harga menjadi satu teks gabungan
            const namaVarianInputs = document.querySelectorAll('.input-nama-varian');
            const hargaVarianInputs = document.querySelectorAll('.input-harga-varian');
            let arrayVarian = [];
            
            for(let i = 0; i < namaVarianInputs.length; i++) {
                const nameV = namaVarianInputs[i].value.trim();
                const priceV = hargaVarianInputs[i].value.trim();
                if(nameV !== "" && priceV !== "") {
                    arrayVarian.push(`${nameV}:${priceV}`); // Disimpan dengan pola Nama:Harga
                }
            }
            const urlVarianGabungan = arrayVarian.join(',');

            if(namaBarang === "" || hargaBarang === "" || stokBarang === "" || deskripsiBarang === "" || daftarFile.length === 0) {
                alert("Tolong isi semua data utama dan pilih minimal 1 foto/video!");
                return;
            }

            tombol.innerText = `Mengunggah ${daftarFile.length} media (Tunggu sebentar)...`;
            tombol.disabled = true;

            let kumpulanLink = [];

            for(let i = 0; i < daftarFile.length; i++) {
                let file = daftarFile[i];
                let namaAman = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '');
                let namaFileUnik = Date.now() + "_" + i + "_" + namaAman; 
                
                const { data: dataFoto, error: errorFoto } = await dbToko.storage.from('foto-barang').upload(namaFileUnik, file);

                if (errorFoto) {
                    alert("Gagal mengunggah file " + file.name + ": " + errorFoto.message);
                    tombol.innerText = "Simpan Barang & Media";
                    tombol.disabled = false;
                    return;
                }

                const { data: linkMedia } = dbToko.storage.from('foto-barang').getPublicUrl(namaFileUnik);
                kumpulanLink.push(linkMedia.publicUrl);
            }

            const urlGabungan = kumpulanLink.join(',');
            tombol.innerText = "Menyimpan data ke etalase...";

            const { data, error } = await dbToko.from('produk').insert([
                { 
                    nama_barang: namaBarang, 
                    varian: urlVarianGabungan, // Mengirim teks rahasia varian:harga
                    harga: hargaBarang, 
                    stok: stokBarang, 
                    deskripsi: deskripsiBarang,
                    foto_url: urlGabungan
                }
            ]);

            if (error) {
                alert("Data gagal disimpan: " + error.message);
            } else {
                alert("Berhasil! Barang dan varian harga sudah masuk etalase.");
                document.getElementById('nama').value = "";
                document.getElementById('harga').value = "";
                document.getElementById('stok').value = "";
                document.getElementById('deskripsi').value = "";
                document.getElementById('wadah-varian-input').innerHTML = "";
                tambahBarisVarian();
                daftarFile = []; 
                tampilkanPreview(); 
            }
            tombol.innerText = "Simpan Barang & Media";
            tombol.disabled = false;
        }
    </script>
</body>
</html>
