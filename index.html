<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made in Indonesia</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; text-align: center; }
        .wadah-toko { width: 100%; max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .kartu-produk { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fafafa; margin-top: 20px; text-align: left; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .kartu-produk:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-color: #bbb; }
        
        .galeri-media { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 15px; padding-bottom: 5px; scroll-snap-type: x mandatory; }
        .item-media { flex: 0 0 90%; height: 250px; object-fit: contain; border-radius: 5px; background-color: transparent; scroll-snap-align: center; }
        
        .harga { color: #2ecc71; font-size: 20px; font-weight: bold; margin: 5px 0 10px 0; }
        .tombol-detail { display: block; text-align: center; background-color: #007bff; color: white; padding: 12px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .tombol-detail:hover { background-color: #0056b3; }
        
        .link-jual { display: inline-block; color: #007bff; text-decoration: none; font-weight: bold; padding: 10px 20px; border: 2px solid #007bff; border-radius: 5px; }
        .link-jual:hover { background-color: #007bff; color: white; }
        .wadah-menu-login { background: #eaf2f8; padding: 12px; border-radius: 5px; font-size: 14px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-link-menu { color: #007bff; text-decoration: none; font-weight: bold; }
        .btn-keluar-menu { color: #dc3545; text-decoration: none; font-weight: bold; margin-left: 10px; }
        .nama-toko-penjual { font-size: 13px; color: #666; margin-top: 0; margin-bottom: 8px; display: block; }
        
        .wadah-nav-aksi { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .btn-keranjang-nav { background-color: #ff9800; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .btn-keranjang-nav:hover { background-color: #e65100; }

        #pesan-status { color: #666; font-style: italic; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="wadah-toko">
        <h1>Made in Indonesia</h1>
        <p>Tempat meletakkan dan menjual barang dengan mudah.</p>
        
        <div id="navigasi-atas">
            <p id="pesan-status">Memeriksa status...</p>
        </div>

        <div class="wadah-nav-aksi">
            <span style="font-size: 14px; color: #555;">Selamat Datang! Silakan Berbelanja</span>
            <a href="keranjang.html" class="btn-keranjang-nav">🛒 Keranjang (<span id="angka-badge-nav">0</span>)</a>
        </div>

        <div id="daftar-produk">
            <p id="pesan-status">Sedang menyusun etalase toko...</p>
        </div>
    </div>

    <script>
        const URL_SUPABASE = 'https://obdmfjjckdhzqbvhpung.supabase.co';
        const KUNCI_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZG1mampja2RoenFidmhwdW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjAwNTIsImV4cCI6MjA5ODYzNjA1Mn0.8zK13NJjFLopp3k5FmLn9Re88pFLiZPxV4RgPaEKj7M';
        const dbToko = window.supabase.createClient(URL_SUPABASE, KUNCI_SUPABASE);
        
        async function tampilkanProduk() {
            const wadahProduk = document.getElementById('daftar-produk');
            const wadahNavigasi = document.getElementById('navigasi-atas');

            const { data: { session } } = await dbToko.auth.getSession();
            const emailUserLogin = session ? session.user.email : null;

            // FUNGSI HITUNG KERANJANG BERDASARKAN EMAIL PRIVAT
            function hitungBadgeKeranjang(emailUser) {
                if (!emailUser) {
                    document.getElementById('angka-badge-nav').innerText = "0";
                    return;
                }
                const kunciPrivat = 'keranjang_' + emailUser;
                const keranjang = JSON.parse(localStorage.getItem(kunciPrivat)) || [];
                let totalBarang = 0;
                keranjang.forEach(item => {
                    totalBarang += parseInt(item.jumlah);
                });
                document.getElementById('angka-badge-nav').innerText = totalBarang;
            }

            hitungBadgeKeranjang(emailUserLogin); 

            if (emailUserLogin) {
                const namaTokoMenu = emailUserLogin.split('@')[0];
                wadahNavigasi.innerHTML = `
                    <div class="wadah-menu-login">
                        <span>Toko: <strong>${namaTokoMenu}</strong></span>
                        <div>
                            <a href="akun.html" class="btn-link-menu">Akun Saya</a>
                            <a href="#" class="btn-keluar-menu" onclick="prosesKeluarHalamanUtama(event)">Keluar</a>
                        </div>
                    </div>
                `;
            } else {
                wadahNavigasi.innerHTML = `<a href="login.html" class="link-jual">Masuk Toko / Jual Barang</a>`;
            }

            const { data, error } = await dbToko.from('produk').select('*').order('created_at', { ascending: false });

            if (error) { wadahProduk.innerHTML = '<p style="color:red;">Gagal memuat barang: ' + error.message + '</p>'; return; }
            if (data.length === 0) { wadahProduk.innerHTML = '<p>Belum ada barang yang dijual.</p>'; return; }

            wadahProduk.innerHTML = '';

            data.forEach(barang => {
                const hargaRupiahAwal = new Intl.NumberFormat('id-ID').format(barang.harga);

                let htmlMedia = '';
                if (barang.foto_url) {
                    const daftarLink = barang.foto_url.split(',');
                    daftarLink.sort((a, b) => {
                        const isVideoA = a.toLowerCase().match(/\.(mp4|mov|webm)$/i);
                        const isVideoB = b.toLowerCase().match(/\.(mp4|mov|webm)$/i);
                        if (isVideoA && !isVideoB) return -1;
                        if (!isVideoA && isVideoB) return 1;
                        return 0;
                    });
                    
                    htmlMedia = '<div class="galeri-media">';
                    daftarLink.forEach(link => {
                        if (link.toLowerCase().match(/\.(mp4|mov|webm)$/i)) {
                            htmlMedia += `<video src="${link}" class="item-media" controls preload="metadata" onclick="event.stopPropagation()"></video>`;
                        } else {
                            htmlMedia += `<img src="${link}" class="item-media" alt="${barang.nama_barang}">`;
                        }
                    });
                    htmlMedia += '</div>';
                }

                const namaToko = barang.email_penjual ? barang.email_penjual.split('@')[0] : 'Umum';

                const elemenProduk = `
                    <div class="kartu-produk" onclick="window.location.href='detail-produk.html?id=${barang.id}'">
                        ${htmlMedia}
                        <h2 style="margin-top: 0; margin-bottom: 2px; color:#333;">${barang.nama_barang}</h2>
                        <span class="nama-toko-penjual">Toko: <strong>${namaToko}</strong></span>
                        <p class="harga">Rp ${hargaRupiahAwal}</p>
                        <a href="detail-produk.html?id=${barang.id}" class="tombol-detail">Lihat Detail & Beli</a>
                    </div>
                `;
                wadahProduk.innerHTML += elemenProduk;
            });
        }

        async function prosesKeluarHalamanUtama(event) {
            event.preventDefault();
            await dbToko.auth.signOut();
            window.location.reload();
        }

        tampilkanProduk();
    </script>
</body>
</html>
