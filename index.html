<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made in Indonesia</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; text-align: center; }
        .wadah-toko { width: 100%; max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .kartu-produk { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fafafa; margin-top: 20px; text-align: left; overflow: hidden; }
        
        .galeri-media { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 15px; padding-bottom: 5px; scroll-snap-type: x mandatory; }
        .item-media { flex: 0 0 90%; height: 300px; object-fit: contain; border-radius: 5px; background-color: transparent; scroll-snap-align: center; }
        
        .pilihan-varian p { margin: 10px 0 5px 0; font-weight: bold; font-size: 14px; }
        .wadah-tombol-varian { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .tombol-varian { padding: 8px 12px; border: 1px solid #ccc; background: white; border-radius: 5px; cursor: pointer; font-size: 14px; color: #333; transition: 0.2s; }
        .tombol-varian.aktif { border-color: #25d366; color: #25d366; background: #e8f9ef; font-weight: bold; }
        
        .harga { color: #2ecc71; font-size: 20px; font-weight: bold; margin: 5px 0 15px 0; }
        .tombol-beli { display: block; text-align: center; background-color: #25d366; color: white; padding: 12px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .tombol-beli:hover { background-color: #128c7e; }
        
        .link-jual { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; font-weight: bold; padding: 10px 20px; border: 2px solid #007bff; border-radius: 5px; }
        .link-jual:hover { background-color: #007bff; color: white; }
        .wadah-menu-login { background: #eaf2f8; padding: 12px; border-radius: 5px; font-size: 14px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-link-menu { color: #007bff; text-decoration: none; font-weight: bold; }
        .btn-keluar-menu { color: #dc3545; text-decoration: none; font-weight: bold; margin-left: 10px; }
        .tag-pemilik { font-size: 12px; color: #28a745; font-weight: bold; margin-bottom: 8px; display: block; }
        .tombol-hapus-produk { display: block; width: 100%; text-align: center; background-color: #dc3545; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .tombol-hapus-produk:hover { background-color: #bd2130; }
        
        /* Desain teks identitas nama toko */
        .nama-toko-penjual { font-size: 13px; color: #666; margin-top: 0; margin-bottom: 12px; display: block; }
        
        #pesan-status { color: #666; font-style: italic; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="wadah-toko">
        <h1>Made in Indonesia</h1>
        <p>Tempat meletakkan dan menjual barang dengan mudah.</p>
        
        <div id="navigasi-atas">
            <p id="pesan-status">Memeriksa status...</p>
        </div>

        <div id="daftar-produk">
            <p id="pesan-status">Sedang menyusun etalase toko...</p>
        </div>
    </div>

    <script>
        const URL_SUPABASE = 'https://obdmfjjckdhzqbvhpung.supabase.co';
        const KUNCI_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZG1mampja2RoenFidmhwdW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjAwNTIsImV4cCI6MjA5ODYzNjA1Mn0.8zK13NJjFLopp3k5FmLn9Re88pFLiZPxV4RgPaEKj7M';
        const dbToko = window.supabase.createClient(URL_SUPABASE, KUNCI_SUPABASE);
        
        const NOMOR_WA = "6281234567890"; 

        async function tampilkanProduk() {
            const wadahProduk = document.getElementById('daftar-produk');
            const wadahNavigasi = document.getElementById('navigasi-atas');

            const { data: { session } } = await dbToko.auth.getSession();
            const emailUserLogin = session ? session.user.email : null;

            // 1. PEMBERSIHAN TANDA "+" DI MENU ATAS
            if (emailUserLogin) {
                wadahNavigasi.innerHTML = `
                    <div class="wadah-menu-login">
                        <span>Toko: <strong>${emailUserLogin}</strong></span>
                        <div>
                            <a href="tambah-produk.html" class="btn-link-menu">Jual Barang</a>
                            <a href="#" class="btn-keluar-menu" onclick="prosesKeluarHalamanUtama(event)">Keluar</a>
                        </div>
                    </div>
                `;
            } else {
                wadahNavigasi.innerHTML = `<a href="login.html" class="link-jual">Masuk Toko / Jual Barang</a>`;
            }

            const { data, error } = await dbToko.from('produk').select('*').order('created_at', { ascending: false });

            if (error) {
                wadahProduk.innerHTML = '<p style="color:red;">Gagal memuat barang: ' + error.message + '</p>';
                return;
            }

            if (data.length === 0) {
                wadahProduk.innerHTML = '<p>Belum ada barang yang dijual.</p>';
                return;
            }

            wadahProduk.innerHTML = '';

            data.forEach(barang => {
                const hargaRupiahAwal = new Intl.NumberFormat('id-ID').format(barang.harga);

                let tampilanStok = '';
                const jumlahStok = parseInt(barang.stok || 0);
                if (jumlahStok >= 51 && jumlahStok <= 100) {
                    tampilanStok = '<p style="color: #f39c12; font-size: 14px; font-weight: bold; margin: 0;">Stok: &lt; 100</p>'; 
                } else if (jumlahStok <= 50) {
                    tampilanStok = `<p style="color: #e74c3c; font-size: 14px; font-weight: bold; margin: 0;">Sisa Stok: ${jumlahStok}</p>`;
                }

                let htmlMedia = '';
                if (barang.foto_url) {
                    const daftarLink = barang.foto_url.split(',');
                    daftarLink.sort((a, b) => {
                        const isVideoA = a.toLowerCase().match(/\.(mp4|mov|webm)$/i);
                        const isVideoB = b.toLowerCase().match(/\.(mp4|mov|webm)$/i);
                        if (isVideoA && !isVideoB) return -1;
                        if (!isVideoA && isVideoB) return 1;
                        return 0;
                    });
                    
                    htmlMedia = '<div class="galeri-media">';
                    daftarLink.forEach(link => {
                        if (link.toLowerCase().match(/\.(mp4|mov|webm)$/i)) {
                            htmlMedia += `<video src="${link}" class="item-media" controls preload="metadata"></video>`;
                        } else {
                            htmlMedia += `<img src="${link}" class="item-media" alt="${barang.nama_barang}">`;
                        }
                    });
                    htmlMedia += '</div>';
                }

                let htmlVarian = '';
                if (barang.varian) {
                    const listVarian = barang.varian.split(',').map(v => v.trim()).filter(v => v !== '');
                    if (listVarian.length > 0) {
                        htmlVarian += `<div class="pilihan-varian"><p>Pilih Varian:</p><div class="wadah-tombol-varian">`;
                        listVarian.forEach(v => {
                            const pecahan = v.split(':'); 
                            const namaVarian = pecahan[0];
                            const hargaVarianSpesifik = pecahan[1] || barang.harga;
                            
                            htmlVarian += `<button class="tombol-varian" onclick="pilihVarian(this, '${barang.id}', '${barang.nama_barang}', '${hargaVarianSpesifik}', '${namaVarian}')">${namaVarian}</button>`;
                        });
                        htmlVarian += `</div></div>`;
                    }
                }

                let htmlTombolHapus = '';
                if (emailUserLogin && barang.email_penjual === emailUserLogin) {
                    htmlTombolHapus = `
                        <span class="tag-pemilik">✓ Ini Produk Tokomu</span>
                        <button class="tombol-hapus-produk" onclick="hapusProdukOtomatis('${barang.id}', '${barang.nama_barang}')">Hapus Produk Ini</button>
                    `;
                }

                // 2. AMBIL EMAIL DAN TAMPILKAN SEBAGAI NAMA TOKO
                const namaToko = barang.email_penjual ? barang.email_penjual.split('@')[0] : 'Umum';

                const pesanWaAwal = `Halo, saya tertarik membeli ${barang.nama_barang} seharga Rp${hargaRupiahAwal}.`;
                const linkWaAwal = `https://wa.me/${NOMOR_WA}?text=${encodeURIComponent(pesanWaAwal)}`;
                
                const elemenProduk = `
                    <div class="kartu-produk">
                        ${htmlMedia}
                        <h2 style="margin-top: 0; margin-bottom: 2px;">${barang.nama_barang}</h2>
                        
                        <span class="nama-toko-penjual">Toko: <strong>${namaToko}</strong></span>
                        
                        <p style="margin-top: 0; font-size: 14px; color: #555; white-space: pre-wrap; margin-bottom: 10px;">${barang.deskripsi}</p>
                        
                        ${htmlVarian}
                        ${tampilanStok}
                        
                        <p class="harga" id="harga-${barang.id}">Rp ${hargaRupiahAwal}</p>
                        <a href="${linkWaAwal}" id="wa-${barang.id}" class="tombol-beli" target="_blank">Beli via WhatsApp</a>
                        
                        ${htmlTombolHapus}
                    </div>
                `;
                
                wadahProduk.innerHTML += elemenProduk;
            });
        }

        function pilihVarian(elemenTombol, idProduk, namaBarang, hargaVarian, namaVarian) {
            const wadah = elemenTombol.parentElement;
            const semuaTombol = wadah.querySelectorAll('.tombol-varian');
            semuaTombol.forEach(btn => btn.classList.remove('aktif'));
            
            elemenTombol.classList.add('aktif');

            const hargaFormat = new Intl.NumberFormat('id-ID').format(hargaVarian);
            document.getElementById(`harga-${idProduk}`).innerText = `Rp ${hargaFormat}`;

            const tombolWa = document.getElementById(`wa-${idProduk}`);
            const pesanWaBaru = `Halo, saya tertarik membeli ${namaBarang} (Varian: ${namaVarian}) seharga Rp${hargaFormat}.`;
            tombolWa.href = `https://wa.me/${NOMOR_WA}?text=${encodeURIComponent(pesanWaBaru)}`;
        }

        async function hapusProdukOtomatis(idProduk, namaBarang) {
            const konfirmasi = confirm(`Apakah kamu yakin ingin menghapus produk "${namaBarang}" dari etalase tokomu?`);
            if (!konfirmasi) return; 

            const { error } = await dbToko
                .from('produk')
                .delete()
                .eq('id', idProduk);

            if (error) {
                alert("Yah, gagal menghapus produk: " + error.message);
            } else {
                alert("Sukses! Produk berhasil dihapus dari etalase.");
                tampilkanProduk(); 
            }
        }

        async function prosesKeluarHalamanUtama(event) {
            event.preventDefault();
            await dbToko.auth.signOut();
            alert("Kamu telah keluar dari akun penjual.");
            window.location.reload();
        }

        tampilkanProduk();
    </script>
</body>
</html>
