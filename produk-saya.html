<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produk Saya - Made in Indonesia</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; text-align: center; }
        .wadah-toko { width: 100%; max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .kartu-produk { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fafafa; margin-top: 20px; text-align: left; overflow: hidden; }
        
        .galeri-media { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 15px; padding-bottom: 5px; scroll-snap-type: x mandatory; }
        .item-media { flex: 0 0 90%; height: 300px; object-fit: contain; border-radius: 5px; background-color: transparent; scroll-snap-align: center; }
        
        .pilihan-varian p { margin: 10px 0 5px 0; font-weight: bold; font-size: 14px; }
        .wadah-tombol-varian { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .tombol-varian { padding: 8px 12px; border: 1px solid #ccc; background: white; border-radius: 5px; cursor: pointer; font-size: 14px; color: #333; }
        .tombol-varian.aktif { border-color: #007bff; color: #007bff; background: #ebf5ff; font-weight: bold; }
        .harga { color: #2ecc71; font-size: 20px; font-weight: bold; margin: 5px 0 15px 0; }
        
        /* DESAIN BARU: TOMBOL TAMBAH, EDIT, DAN HAPUS */
        .btn-tambah-utama { display: block; width: 100%; text-align: center; background-color: #28a745; color: white; padding: 14px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-bottom: 20px; font-size: 16px; }
        .btn-tambah-utama:hover { background-color: #218838; }
        
        .grup-tombol-aksi { display: flex; gap: 10px; margin-top: 15px; }
        .tombol-edit-produk { flex: 1; text-align: center; background-color: #007bff; color: white; padding: 12px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .tombol-edit-produk:hover { background-color: #0056b3; }
        .tombol-hapus-produk { flex: 1; text-align: center; background-color: #dc3545; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .tombol-hapus-produk:hover { background-color: #bd2130; }
        
        .header-manajemen { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .btn-kembali { text-decoration: none; color: #007bff; font-weight: bold; font-size: 14px; }
        #pesan-status { color: #666; font-style: italic; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="wadah-toko">
        <div class="header-manajemen">
            <a href="akun.html" class="btn-kembali">← Kembali ke Akun</a>
            <h2 style="margin: 0; font-size: 18px; color: #333;">Kelola Dagangan</h2>
        </div>

        <!-- TOMBOL TAMBAH BARANG DIPINDAHKAN KE SINI -->
        <a href="tambah-produk.html" class="btn-tambah-utama">➕ Tambah Produk Baru</a>

        <div id="daftar-produk-saya">
            <p id="pesan-status">Sedang mencari barang daganganmu...</p>
        </div>
    </div>

    <script>
        const URL_SUPABASE = 'https://obdmfjjckdhzqbvhpung.supabase.co';
        const KUNCI_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZG1mampja2RoenFidmhwdW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjAwNTIsImV4cCI6MjA5ODYzNjA1Mn0.8zK13NJjFLopp3k5FmLn9Re88pFLiZPxV4RgPaEKj7M';
        const dbToko = window.supabase.createClient(URL_SUPABASE, KUNCI_SUPABASE);

        async function ambilProdukSaya() {
            const wadahProduk = document.getElementById('daftar-produk-saya');
            const { data: { session } } = await dbToko.auth.getSession();
            if (!session) { window.location.replace("login.html"); return; }
            
            const emailUserLogin = session.user.email;

            const { data, error } = await dbToko.from('produk').select('*').eq('email_penjual', emailUserLogin).order('created_at', { ascending: false });

            if (error) { wadahProduk.innerHTML = '<p style="color:red;">Gagal memuat barang: ' + error.message + '</p>'; return; }

            if (data.length === 0) {
                wadahProduk.innerHTML = '<p style="color:#777; margin: 30px 0;">Kamu belum memajang produk apa pun. Silakan klik tombol hijau di atas!</p>';
                return;
            }

            wadahProduk.innerHTML = '';

            data.forEach(barang => {
                const hargaRupiahAwal = new Intl.NumberFormat('id-ID').format(barang.harga);

                let tampilanStok = '';
                const jumlahStok = parseInt(barang.stok || 0);
                if (jumlahStok >= 51 && jumlahStok <= 100) {
                    tampilanStok = '<p style="color: #f39c12; font-size: 14px; font-weight: bold; margin: 0;">Stok: &lt; 100</p>'; 
                } else if (jumlahStok <= 50) {
                    tampilanStok = `<p style="color: #e74c3c; font-size: 14px; font-weight: bold; margin: 0;">Sisa Stok: ${jumlahStok}</p>`;
                }

                let htmlMedia = '';
                if (barang.foto_url) {
                    const daftarLink = barang.foto_url.split(',');
                    daftarLink.sort((a, b) => {
                        const isVideoA = a.toLowerCase().match(/\.(mp4|mov|webm)$/i);
                        const isVideoB = b.toLowerCase().match(/\.(mp4|mov|webm)$/i);
                        if (isVideoA && !isVideoB) return -1;
                        if (!isVideoA && isVideoB) return 1;
                        return 0;
                    });
                    htmlMedia = '<div class="galeri-media">';
                    daftarLink.forEach(link => {
                        if (link.toLowerCase().match(/\.(mp4|mov|webm)$/i)) {
                            htmlMedia += `<video src="${link}" class="item-media" controls preload="metadata"></video>`;
                        } else {
                            htmlMedia += `<img src="${link}" class="item-media" alt="${barang.nama_barang}">`;
                        }
                    });
                    htmlMedia += '</div>';
                }

                let htmlVarian = '';
                if (barang.varian) {
                    const listVarian = barang.varian.split(',').map(v => v.trim()).filter(v => v !== '');
                    if (listVarian.length > 0) {
                        htmlVarian += `<div class="pilihan-varian"><p>Daftar Varian:</p><div class="wadah-tombol-varian">`;
                        listVarian.forEach(v => {
                            const pecahan = v.split(':'); 
                            const namaVarian = pecahan[0];
                            const hargaVarianSpesifik = pecahan[1] || barang.harga;
                            htmlVarian += `<button class="tombol-varian" onclick="pilihVarianSaya(this, '${barang.id}', '${hargaVarianSpesifik}')">${namaVarian}</button>`;
                        });
                        htmlVarian += `</div></div>`;
                    }
                }

                const elemenProduk = `
                    <div class="kartu-produk">
                        ${htmlMedia}
                        <h2 style="margin-top: 0; margin-bottom: 5px;">${barang.nama_barang}</h2>
                        <p style="margin-top: 0; font-size: 14px; color: #555; white-space: pre-wrap; margin-bottom: 10px;">${barang.deskripsi}</p>
                        ${htmlVarian}
                        ${tampilanStok}
                        <p class="harga" id="harga-${barang.id}">Rp ${hargaRupiahAwal}</p>
                        
                        <!-- TOMBOL EDIT DAN HAPUS BERDAMPINGAN -->
                        <div class="grup-tombol-aksi">
                            <a href="tambah-produk.html?edit=${barang.id}" class="tombol-edit-produk">Edit Produk</a>
                            <button class="tombol-hapus-produk" onclick="hapusProdukSaya('${barang.id}', '${barang.nama_barang}')">Hapus</button>
                        </div>
                    </div>
                `;
                wadahProduk.innerHTML += elemenProduk;
            });
        }

        function pilihVarianSaya(elemenTombol, idProduk, hargaVarian) {
            const wadah = elemenTombol.parentElement;
            const semuaTombol = wadah.querySelectorAll('.tombol-varian');
            semuaTombol.forEach(btn => btn.classList.remove('aktif'));
            elemenTombol.classList.add('aktif');

            const hargaFormat = new Intl.NumberFormat('id-ID').format(hargaVarian);
            document.getElementById(`harga-${idProduk}`).innerText = `Rp ${hargaFormat}`;
        }

        async function hapusProdukSaya(idProduk, namaBarang) {
            const konfirmasi = confirm(`Yakin ingin menghapus produk "${namaBarang}"?`);
            if (!konfirmasi) return;

            const { error } = await dbToko.from('produk').delete().eq('id', idProduk);
            if (error) { alert("Gagal menghapus produk: " + error.message); } 
            else { alert("Produk berhasil dihapus."); ambilProdukSaya(); }
        }

        ambilProdukSaya();
    </script>
</body>
</html>
