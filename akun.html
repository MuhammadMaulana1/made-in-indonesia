<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akun Saya - Made in Indonesia</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; }
        .wadah-akun { width: 100%; max-width: 450px; margin: 50px auto auto auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        
        /* GAYA PROFIL HEADER */
        .avatar-toko { width: 90px; height: 90px; background-color: #25d366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; margin: 0 auto 15px auto; object-fit: cover; border: 3px solid #eee;}
        h2 { margin: 0 0 5px 0; color: #333; }
        .username-badge { display: inline-block; background: #eaf2f8; color: #007bff; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .email-user { color: #888; font-size: 13px; margin-bottom: 25px; }
        
        /* GAYA MENU TOMBOL */
        .menu-grup { display: flex; flex-direction: column; gap: 12px; }
        .btn-menu { display: block; width: 100%; padding: 14px; text-decoration: none; font-weight: bold; font-size: 15px; border-radius: 5px; text-align: center; transition: 0.2s; border: none; cursor: pointer; }
        
        .btn-edit-profil { background-color: #ff9800; color: white; }
        .btn-edit-profil:hover { background-color: #e65100; }
        .btn-alamat { background-color: #17a2b8; color: white; }
        .btn-alamat:hover { background-color: #138496; }
        .btn-kelola { background-color: #007bff; color: white; }
        .btn-kelola:hover { background-color: #0056b3; }
        .btn-etalase { background-color: white; color: #333; border: 1px solid #ccc; }
        .btn-etalase:hover { background-color: #f8f9fa; }
        .btn-keluar { background-color: #dc3545; color: white; margin-top: 15px; }
        .btn-keluar:hover { background-color: #c82333; }

        /* GAYA PANEL EDIT PROFIL */
        #panel-edit-profil { display: none; text-align: left; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; font-size: 14px; color: #444;}
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; background: #fff;}
        .info-teks { font-size: 12px; color: #777; margin-top: 4px; display: block; }
        
        .btn-simpan-profil { display: block; width: 100%; background-color: #28a745; color: white; padding: 14px; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; margin-top: 25px; cursor: pointer; }
        .btn-batal { display: block; width: 100%; text-align: center; color: #dc3545; background: none; border: none; margin-top: 15px; font-weight: bold; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- WADAH MENU UTAMA AKUN -->
    <div class="wadah-akun" id="panel-menu-utama" style="display: none;">
        <img src="" class="avatar-toko" id="foto-profil-tampil" style="display: none;" alt="Foto Profil">
        <div class="avatar-toko" id="huruf-depan">?</div>
        
        <h2 id="nama-tampil">Memuat...</h2>
        <div class="username-badge" id="username-tampil">@user_baru</div>
        <p class="email-user" id="email-aktif">email@rahasia.com</p>

        <div class="menu-grup">
            <button class="btn-menu btn-edit-profil" onclick="bukaPanelEdit()">⚙️ Edit Profil & Foto</button>
            <button class="btn-menu btn-alamat" onclick="alert('Fitur Daftar Alamat akan kita buat di Sesi 2!')">📍 Daftar Alamat (Segera)</button>
            <a href="produk-saya.html" class="btn-menu btn-kelola">📦 Kelola Produk Saya</a>
            <a href="index.html" class="btn-menu btn-etalase">🏪 Lihat Etalase Toko Utama</a>
            <button class="btn-menu btn-keluar" onclick="prosesLogout()">Keluar (Logout)</button>
        </div>
    </div>

    <!-- WADAH PANEL EDIT PROFIL -->
    <div class="wadah-akun" id="panel-edit-profil">
        <h2 style="text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">Edit Profil Akun</h2>
        
        <label>Foto Profil / Logo Toko</label>
        <input type="file" accept="image/*" id="input-foto-profil">
        <span class="info-teks">Pilih foto persegi agar hasil bundarnya rapi.</span>

        <label>Nama Lengkap / Nama Toko</label>
        <input type="text" id="input-nama-toko" placeholder="Contoh: Toko Maju Jaya">
        <span class="info-teks">Nama ini yang akan dilihat oleh pembeli di aplikasi.</span>

        <label>Username (ID Unik)</label>
        <input type="text" id="input-username" placeholder="Contoh: majujaya99">
        <span class="info-teks">Gunakan huruf dan angka tanpa spasi (cth: @majujaya99).</span>

        <button class="btn-simpan-profil" id="tombol-simpan-profil" onclick="simpanProfil()">Simpan Perubahan</button>
        <button class="btn-batal" onclick="tutupPanelEdit()">Batal</button>
    </div>

    <script>
        const URL_SUPABASE = 'https://obdmfjjckdhzqbvhpung.supabase.co';
        const KUNCI_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZG1mampja2RoenFidmhwdW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjAwNTIsImV4cCI6MjA5ODYzNjA1Mn0.8zK13NJjFLopp3k5FmLn9Re88pFLiZPxV4RgPaEKj7M';
        const dbToko = window.supabase.createClient(URL_SUPABASE, KUNCI_SUPABASE);

        let emailPenggunaAktif = "";
        let fotoLama = "";

        async function muatDataAkun() {
            const { data: { session } } = await dbToko.auth.getSession();
            
            if (!session) {
                alert("Silakan login terlebih dahulu.");
                window.location.replace("login.html");
                return;
            }

            emailPenggunaAktif = session.user.email;
            document.getElementById('email-aktif').innerText = emailPenggunaAktif;

            // KODE DIPERBARUI: Mengambil dari tabel 'profile'
            const { data: profil, error } = await dbToko.from('profile').select('*').eq('email', emailPenggunaAktif).single();

            if (profil) {
                document.getElementById('nama-tampil').innerText = profil.nama_toko || "Nama Belum Diatur";
                document.getElementById('username-tampil').innerText = profil.username ? "@" + profil.username : "@" + emailPenggunaAktif.split('@')[0];
                
                document.getElementById('input-nama-toko').value = profil.nama_toko || "";
                document.getElementById('input-username').value = profil.username || "";
                
                if (profil.foto_url) {
                    fotoLama = profil.foto_url;
                    document.getElementById('foto-profil-tampil').src = profil.foto_url;
                    document.getElementById('foto-profil-tampil').style.display = "flex";
                    document.getElementById('huruf-depan').style.display = "none";
                } else {
                    document.getElementById('huruf-depan').innerText = (profil.nama_toko ? profil.nama_toko.charAt(0) : emailPenggunaAktif.charAt(0)).toUpperCase();
                }
            } else {
                const namaAwal = emailPenggunaAktif.split('@')[0];
                document.getElementById('nama-tampil').innerText = "Pengguna Baru";
                document.getElementById('username-tampil').innerText = "@" + namaAwal;
                document.getElementById('huruf-depan').innerText = namaAwal.charAt(0).toUpperCase();
                document.getElementById('input-username').value = namaAwal;
            }

            document.getElementById('panel-menu-utama').style.display = 'block';
        }

        function bukaPanelEdit() {
            document.getElementById('panel-menu-utama').style.display = 'none';
            document.getElementById('panel-edit-profil').style.display = 'block';
        }

        function tutupPanelEdit() {
            document.getElementById('panel-edit-profil').style.display = 'none';
            document.getElementById('panel-menu-utama').style.display = 'block';
        }

        async function simpanProfil() {
            const namaBaru = document.getElementById('input-nama-toko').value.trim();
            const userBaru = document.getElementById('input-username').value.trim().replace(/\s+/g, '').toLowerCase(); 
            const fileFoto = document.getElementById('input-foto-profil').files[0];
            const tombol = document.getElementById('tombol-simpan-profil');

            if (namaBaru === "" || userBaru === "") {
                alert("Nama Tampil dan Username tidak boleh kosong!");
                return;
            }

            tombol.innerText = "Menyimpan Data...";
            tombol.disabled = true;
            let linkFotoAkhir = fotoLama;

            if (fileFoto) {
                const namaFileAman = Date.now() + "_" + emailPenggunaAktif.split('@')[0] + ".jpg";
                // KODE DIPERBARUI: Mengirim foto ke bucket 'profile-user'
                const { data: dataUpload, error: errorUpload } = await dbToko.storage.from('profile-user').upload(namaFileAman, fileFoto);
                
                if (errorUpload) {
                    alert("Gagal mengunggah foto profil: " + errorUpload.message);
                    tombol.innerText = "Simpan Perubahan";
                    tombol.disabled = false;
                    return;
                }
                // KODE DIPERBARUI: Mengambil link dari bucket 'profile-user'
                const { data: linkMedia } = dbToko.storage.from('profile-user').getPublicUrl(namaFileAman);
                linkFotoAkhir = linkMedia.publicUrl;
            }

            // KODE DIPERBARUI: Menyimpan teks ke tabel 'profile'
            const { error } = await dbToko.from('profile').upsert({
                email: emailPenggunaAktif,
                username: userBaru,
                nama_toko: namaBaru,
                foto_url: linkFotoAkhir
            }, { onConflict: 'email' });

            if (error) {
                if (error.message.includes("duplicate key") || error.message.includes("unique")) {
                    alert("Gagal: Username @" + userBaru + " sudah dipakai oleh orang lain. Silakan cari nama lain.");
                } else {
                    alert("Gagal menyimpan profil: " + error.message);
                }
            } else {
                alert("Sukses! Profil berhasil diperbarui.");
                window.location.reload(); 
            }

            tombol.innerText = "Simpan Perubahan";
            tombol.disabled = false;
        }

        async function prosesLogout() {
            await dbToko.auth.signOut();
            window.location.replace("index.html");
        }

        muatDataAkun();
    </script>
</body>
</html>
