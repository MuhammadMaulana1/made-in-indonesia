<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Pembayaran - Made in Indonesia</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 15px; }
        .wadah-checkout { width: 100%; max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 15px;}
        
        .ringkasan-box { background: #e8f9ef; border: 1px solid #25d366; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .ringkasan-box h3 { margin: 0 0 10px 0; font-size: 16px; color: #218838; }
        .teks-ringkasan { font-size: 14px; color: #444; line-height: 1.6; white-space: pre-wrap; margin-bottom: 10px; }
        .total-final { font-size: 18px; font-weight: bold; color: #dc3545; border-top: 1px dashed #ccc; padding-top: 10px; }

        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; color: #333; font-size: 14px;}
        
        /* Gaya baru untuk pilihan alamat */
        select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; background-color: #fff; cursor: pointer;}
        .kartu-alamat-terpilih { background: #fdfdfd; border: 1px dashed #007bff; padding: 15px; border-radius: 5px; margin-top: 10px; margin-bottom: 10px; font-size: 14px; color: #444; line-height: 1.5;}
        .link-tambah-alamat { display: block; text-align: right; color: #007bff; text-decoration: none; font-size: 13px; font-weight: bold; margin-bottom: 25px;}
        .link-tambah-alamat:hover { text-decoration: underline; }
        .pesan-error-alamat { background-color: #ffeeba; color: #856404; padding: 15px; border-radius: 5px; font-size: 14px; text-align: center; font-weight: bold; margin-top: 10px;}

        .btn-pesan { display: block; width: 100%; text-align: center; background-color: #ff5722; color: white; padding: 15px; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 25px; transition: 0.2s;}
        .btn-pesan:hover { background-color: #e64a19; }
        .btn-pesan:disabled { background-color: #cccccc; cursor: not-allowed; }
        .btn-kembali { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="wadah-checkout" id="wadah-konten-checkout" style="display: none;">
        <h2>Pengiriman & Pembayaran</h2>
        
        <div class="ringkasan-box">
            <h3>Barang yang dibeli:</h3>
            <div id="teks-daftar-barang" class="teks-ringkasan">Memuat keranjang...</div>
            <div class="total-final" id="teks-total-bayar">Total: Rp 0</div>
        </div>

        <!-- BAGIAN ALAMAT YANG DIPERBARUI -->
        <label>📍 Kirim ke Alamat:</label>
        <select id="pilih-alamat" onchange="perbaruiTampilanAlamat()">
            <option value="">Memuat daftar alamat...</option>
        </select>
        
        <div id="wadah-kartu-alamat">
            <div class="kartu-alamat-terpilih" id="tampilan-detail-alamat">
                <!-- Detail alamat akan muncul di sini via JS -->
            </div>
        </div>
        
        <a href="alamat.html" class="link-tambah-alamat">+ Kelola / Tambah Alamat Baru</a>
        <!-- AKHIR BAGIAN ALAMAT -->

        <button class="btn-pesan" id="tombol-buat-pesanan" onclick="kirimPesananKeSistem()">Buat Pesanan Sekarang</button>
        <a href="keranjang.html" class="btn-kembali">← Kembali ke Keranjang</a>
    </div>

    <script>
        const URL_SUPABASE = 'https://obdmfjjckdhzqbvhpung.supabase.co';
        const KUNCI_SUPABASE = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iZG1mampja2RoenFidmhwdW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNjAwNTIsImV4cCI6MjA5ODYzNjA1Mn0.8zK13NJjFLopp3k5FmLn9Re88pFLiZPxV4RgPaEKj7M';
        const dbToko = window.supabase.createClient(URL_SUPABASE, KUNCI_SUPABASE);

        let keranjangSistem = [];
        let totalBiayaSistem = 0;
        let teksRekapPesanan = "";
        let emailPembeliAktif = "";
        
        let daftarAlamatUser = []; // Variabel untuk menyimpan data alamat dari Supabase
        let alamatTerpilih = null; // Menyimpan objek alamat yang dipilih untuk dikirim ke tabel pesanan

        async function muatDataCheckout() {
            const { data: { session } } = await dbToko.auth.getSession();
            if (!session) {
                alert("Akses ditolak! Silakan login terlebih dahulu untuk melakukan pengiriman.");
                window.location.replace("login.html");
                return;
            }
            
            emailPembeliAktif = session.user.email;
            
            // Panggil laci keranjang dari nama kunci privat
            const kunciKeranjang = 'keranjang_' + emailPembeliAktif;
            keranjangSistem = JSON.parse(localStorage.getItem(kunciKeranjang)) || [];
            
            if (keranjangSistem.length === 0) {
                alert("Keranjangmu kosong!");
                window.location.replace("index.html");
                return;
            }

            document.getElementById('wadah-konten-checkout').style.display = "block";

            let htmlRekap = "";
            totalBiayaSistem = 0;

            keranjangSistem.forEach(item => {
                let subTotal = item.harga * item.jumlah;
                totalBiayaSistem += subTotal;
                htmlRekap += `• ${item.jumlah}x ${item.nama} (${item.varian}) - Rp ${new Intl.NumberFormat('id-ID').format(subTotal)}\n`;
            });

            teksRekapPesanan = htmlRekap;
            document.getElementById('teks-daftar-barang').innerText = htmlRekap;
            document.getElementById('teks-total-bayar').innerText = `Total Tagihan: Rp ${new Intl.NumberFormat('id-ID').format(totalBiayaSistem)}`;
            
            // Setelah keranjang dimuat, langsung tarik data Buku Alamat
            tarikBukuAlamat();
        }

        // FUNGSI BARU: Menarik data dari tabel alamat_user
        async function tarikBukuAlamat() {
            const { data, error } = await dbToko.from('alamat_user')
                .select('*')
                .eq('email_pemilik', emailPembeliAktif)
                .order('is_utama', { ascending: false }); // Urutkan agar yang "Utama" selalu di index 0

            const selectEl = document.getElementById('pilih-alamat');
            const tombolPesan = document.getElementById('tombol-buat-pesanan');
            const wadahKartu = document.getElementById('wadah-kartu-alamat');

            if (error) {
                console.error("Gagal menarik alamat:", error);
                selectEl.innerHTML = "<option>Terjadi kesalahan jaringan</option>";
                return;
            }

            daftarAlamatUser = data;

            if (daftarAlamatUser.length === 0) {
                // JIKA BELUM PUNYA ALAMAT SAMA SEKALI
                selectEl.innerHTML = "<option value=''>-- Kamu belum menyimpan alamat --</option>";
                selectEl.disabled = true;
                wadahKartu.innerHTML = `<div class="pesan-error-alamat">⚠️ Kamu harus menambahkan alamat pengiriman terlebih dahulu sebelum bisa checkout. <br><br><a href="alamat.html" style="color: #856404; text-decoration: underline;">Klik di sini untuk membuat alamat</a></div>`;
                tombolPesan.disabled = true; // Matikan tombol
                return;
            }

            // JIKA ADA ALAMAT, Masukkan ke dalam dropdown
            selectEl.innerHTML = "";
            daftarAlamatUser.forEach((alamat, index) => {
                let labelUtama = alamat.is_utama ? "[UTAMA] " : "";
                selectEl.innerHTML += `<option value="${index}">${labelUtama}${alamat.label_alamat} - ${alamat.nama_penerima}</option>`;
            });

            // Langsung tampilkan detail alamat teratas (index 0)
            perbaruiTampilanAlamat();
        }

        // FUNGSI BARU: Mengubah tampilan kartu di bawah dropdown saat opsi dipilih
        function perbaruiTampilanAlamat() {
            const indexPilihan = document.getElementById('pilih-alamat').value;
            if (indexPilihan === "") return;

            alamatTerpilih = daftarAlamatUser[indexPilihan];
            
            let catatanHtml = alamatTerpilih.catatan_kurir ? `<br><span style="color: #666; font-size: 12px;">📝 Catatan: ${alamatTerpilih.catatan_kurir}</span>` : '';
            
            document.getElementById('tampilan-detail-alamat').innerHTML = `
                <strong>${alamatTerpilih.nama_penerima}</strong> (${alamatTerpilih.no_hp_penerima})<br>
                ${alamatTerpilih.alamat_lengkap}
                ${catatanHtml}
            `;
        }

        // FUNGSI YANG DIPERBARUI: Mengirim pesanan menggunakan alamatTerpilih
        async function kirimPesananKeSistem() {
            if (!alamatTerpilih) {
                alert("Silakan pilih alamat pengiriman terlebih dahulu!");
                return;
            }

            const tombol = document.getElementById('tombol-buat-pesanan');
            tombol.innerText = "Memproses Pesananmu...";
            tombol.disabled = true;

            // Gabungkan alamat lengkap dengan catatan (jika ada) agar penjual bisa membacanya di satu kolom database lama
            let alamatFinalUntukPenjual = alamatTerpilih.alamat_lengkap;
            if (alamatTerpilih.catatan_kurir) {
                alamatFinalUntukPenjual += ` (Catatan: ${alamatTerpilih.catatan_kurir})`;
            }

            const { data, error } = await dbToko.from('pesanan').insert([
                { 
                    nama_pembeli: alamatTerpilih.nama_penerima, 
                    no_whatsapp: alamatTerpilih.no_hp_penerima, 
                    alamat_pengiriman: alamatFinalUntukPenjual,
                    detail_pesanan: teksRekapPesanan,
                    total_bayar: totalBiayaSistem,
                    status_pesanan: "Pesanan Baru",
                    email_pembeli: emailPembeliAktif
                }
            ]);

            if (error) {
                alert("Gagal mengirim pesanan: " + error.message);
                tombol.innerText = "Buat Pesanan Sekarang";
                tombol.disabled = false;
            } else {
                // HAPUS LACI PENYIMPANAN SETELAH SUKSES
                const kunciKeranjang = 'keranjang_' + emailPembeliAktif;
                localStorage.removeItem(kunciKeranjang); 
                
                alert("Pesanan Berhasil Dibuat! Penjual akan segera memproses barangmu.");
                window.location.replace("index.html");
            }
        }

        muatDataCheckout();
    </script>
</body>
</html>
